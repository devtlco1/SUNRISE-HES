name: Operational Readiness

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  operational-readiness:
    name: Local Operational Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BOOTSTRAP_SUPER_ADMIN_USERNAME: admin
      BOOTSTRAP_SUPER_ADMIN_EMAIL: admin@example.com
      BOOTSTRAP_SUPER_ADMIN_PASSWORD: ChangeThisPassword123!
      SUNRISE_SEED_LOGIN_RETRY_SECONDS: "120"
      SUNRISE_SKIP_API_RESTART: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare readiness virtual environment
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -e packages/shared-python -e "apps/api[dev]"

      - name: Prepare migrated api services
        run: |
          docker compose up -d postgres redis api
          docker compose exec -T api alembic upgrade head

      - name: Run operational readiness flow
        run: ./scripts/local-operational-readiness.sh

      - name: Capture compose diagnostics on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=200 api

      - name: Tear down compose services
        if: always()
        run: docker compose down --remove-orphans --volumes
