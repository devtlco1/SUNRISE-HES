[tool.black]
line-length = 100
target-version = ["py312"]
include = '\.pyi?$'

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["apps/api", "apps/worker", "packages/shared-python"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "N",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["apps/api/tests"]
pythonpath = ["apps/api", "packages/shared-python"]
addopts = "-ra"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
check_untyped_defs = true
strict_equality = true
plugins = ["pydantic.mypy"]
files = ["apps/api", "packages/shared-python", "apps/worker"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
